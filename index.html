<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>皮卡丘抛硬币 ⚡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#FFF8E7 0%,#FFE0B2 30%,#FFCC80 70%,#FFE0B2 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
h1{text-align:center;color:#E65100;font-size:clamp(1.3rem,4vw,2rem);margin:12px 0 4px;text-shadow:2px 2px 0 rgba(255,255,255,.7);display:flex;align-items:center;gap:8px;justify-content:center}
h1 .icon{font-size:1.4em}
.subtitle{text-align:center;color:#BF360C;font-size:.85rem;margin-bottom:12px;opacity:.8}
.main-container{display:flex;gap:16px;width:95%;max-width:1100px;padding:0 8px;flex-wrap:wrap;justify-content:center;align-items:flex-start}
.card{background:rgba(255,255,255,.85);border-radius:20px;padding:16px;box-shadow:0 8px 32px rgba(0,0,0,.1),0 2px 8px rgba(0,0,0,.06);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.6)}
.pikachu-card{flex:0 0 220px;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:320px;position:relative;overflow:hidden}
.pikachu-card .sparkles{position:absolute;pointer-events:none;font-size:14px;animation:floatUp 1.5s ease-out forwards;opacity:0}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(0)}}
.pikachu-card svg{transition:transform .3s;filter:drop-shadow(0 4px 8px rgba(0,0,0,.15))}
.pikachu-card.throw svg{animation:pikaThrow .4s ease-out}
@keyframes pikaThrow{0%,100%{transform:translateY(0)}40%{transform:translateY(-25px) scale(1.05)}70%{transform:translateY(5px) scale(.97)}}
.pikachu-label{color:#E65100;font-weight:700;font-size:.9rem;margin-top:8px;text-align:center}
.coin-card{flex:1 1 340px;max-width:420px;display:flex;flex-direction:column;align-items:center;min-height:380px;justify-content:center}
.coin-stage{perspective:1000px;width:160px;height:160px;display:flex;align-items:center;justify-content:center;margin:20px 0}
.coin{width:140px;height:140px;position:relative;transform-style:preserve-3d;cursor:default}
.coin-face{position:absolute;width:100%;height:100%;border-radius:50%;backface-visibility:hidden;display:flex;align-items:center;justify-content:center;flex-direction:column;font-weight:900;font-size:3rem;border:4px solid;box-shadow:inset 0 0 30px rgba(0,0,0,.15),0 4px 15px rgba(0,0,0,.2)}
.coin-front{background:linear-gradient(135deg,#FFD700,#FFA000,#FFD700,#FFC107);border-color:#E65100;color:#BF360C;transform:rotateY(0deg)}
.coin-front::before{content:'';position:absolute;width:85%;height:85%;border-radius:50%;border:2px dashed rgba(191,54,12,.3)}
.coin-front .symbol{font-size:3.5rem;line-height:1;text-shadow:2px 2px 0 rgba(0,0,0,.1)}
.coin-front .label{font-size:.7rem;letter-spacing:2px;margin-top:-4px}
.coin-back{background:linear-gradient(135deg,#E0E0E0,#9E9E9E,#BDBDBD,#E0E0E0);border-color:#424242;color:#212121;transform:rotateY(180deg)}
.coin-back::before{content:'';position:absolute;width:85%;height:85%;border-radius:50%;border:2px dashed rgba(33,33,33,.25)}
.coin-back .symbol{font-size:3.5rem;line-height:1;text-shadow:2px 2px 0 rgba(0,0,0,.1)}
.coin-back .label{font-size:.7rem;letter-spacing:2px;margin-top:-4px}
.coin-status{font-size:1.2rem;font-weight:700;color:#E65100;margin-top:8px;min-height:30px;text-align:center}
.result-card{flex:0 0 260px;min-height:320px}
.result-card h3{color:#E65100;text-align:center;margin-bottom:12px;font-size:1.1rem;border-bottom:2px solid #FFE0B2;padding-bottom:8px}
.result-badge{display:inline-block;padding:6px 20px;border-radius:20px;font-weight:700;font-size:1.1rem;margin:8px 0;text-align:center;width:100%}
.result-badge.heads{background:linear-gradient(135deg,#FFD700,#FFA000);color:#BF360C}
.result-badge.tails{background:linear-gradient(135deg,#E0E0E0,#9E9E9E);color:#212121}
.result-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin:10px 0}
.result-item{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.7rem;animation:popIn .4s ease-out backwards;transition:transform .3s,opacity .3s}
@keyframes popIn{0%{transform:scale(0);opacity:0}70%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
.result-item.heads{background:linear-gradient(135deg,#FFD700,#FFA000);color:#BF360C;box-shadow:0 2px 8px rgba(255,167,38,.4)}
.result-item.tails{background:linear-gradient(135deg,#E0E0E0,#9E9E9E);color:#212121;box-shadow:0 2px 8px rgba(158,158,158,.4)}
.stats{padding:10px;background:rgba(255,224,178,.3);border-radius:12px}
.stats-title{text-align:center;font-weight:700;color:#E65100;font-size:.85rem;margin-bottom:6px}
.stats-row{display:flex;justify-content:space-between;align-items:center;margin:5px 0;font-size:.82rem}
.stats-bar{height:10px;border-radius:5px;margin:4px 0;display:flex;overflow:hidden}
.stats-bar .heads-bar{background:linear-gradient(90deg,#FFD700,#FFA000);height:100%;transition:width .5s ease}
.stats-bar .tails-bar{background:linear-gradient(90deg,#BDBDBD,#757575);height:100%;transition:width .5s ease}
.stats-big{text-align:center;padding:8px 0}
.stats-big .big-num{font-size:2rem;font-weight:900}
.stats-big .big-label{font-size:.75rem;color:#888}
.deviation{font-size:.75rem;color:#888;text-align:center;margin-top:4px}
.preview-label{font-size:.7rem;color:#999;text-align:center;margin:8px 0 4px}
.btn-group{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin:16px 0 20px;width:95%;max-width:1100px}
.btn{padding:12px 28px;border:none;border-radius:50px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .25s;letter-spacing:1px;box-shadow:0 4px 15px rgba(0,0,0,.15)}
.btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.2)}
.btn:active{transform:translateY(0);box-shadow:0 2px 8px rgba(0,0,0,.15)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-primary{background:linear-gradient(135deg,#FF6B35,#FF8F00);color:#fff;font-size:1.1rem;padding:14px 36px}
.btn-outline{background:transparent;border:2px solid #FF6B35;color:#FF6B35}
.btn-ten{background:linear-gradient(135deg,#7C4DFF,#651FFF);color:#fff}
@keyframes coinShine{0%,100%{opacity:.3}50%{opacity:.6}}
.coin-stage.flipping .coin::after{content:'';position:absolute;top:-20px;left:-20px;right:-20px;bottom:-20px;border-radius:50%;background:radial-gradient(circle,rgba(255,215,0,.3),transparent 70%);animation:coinShine .8s ease-in-out infinite;pointer-events:none;z-index:-1}
@media(max-width:768px){
.main-container{flex-direction:column;align-items:center}
.pikachu-card{flex:0 0 auto;width:100%;max-width:280px;min-height:240px}
.pikachu-card svg{width:140px;height:auto}
.coin-card{width:100%;max-width:100%;min-height:300px}
.result-card{width:100%;max-width:100%}
.coin{width:110px;height:110px}
.coin-stage{width:130px;height:130px}
.coin-face{font-size:2.2rem}
.coin-face .symbol{font-size:2.5rem}
}
footer{text-align:center;color:#BF360C;font-size:.75rem;opacity:.6;margin:8px 0 16px}
</style>
</head>
<body>
<h1><span class="icon">⚡</span>皮卡丘抛硬币<span class="icon">⚡</span></h1>
<p class="subtitle">让皮卡丘帮你做决定！每次抛掷概率均等 50%/50%</p>
<div class="main-container">
<div class="card pikachu-card" id="pikachuCard">
<svg viewBox="0 0 200 240" width="160" xmlns="http://www.w3.org/2000/svg">
<ellipse cx="100" cy="165" rx="52" ry="60" fill="#F7D02C" stroke="#D4A017" stroke-width="1.5"/>
<ellipse cx="100" cy="170" rx="30" ry="18" fill="#FFF3CD" opacity=".5"/>
<circle cx="100" cy="88" r="48" fill="#F7D02C" stroke="#D4A017" stroke-width="1.5"/>
<ellipse cx="68" cy="32" rx="17" ry="38" fill="#F7D02C" stroke="#D4A017" stroke-width="1" transform="rotate(-15,68,32)"/>
<ellipse cx="64" cy="16" rx="11" ry="14" fill="#222"/>
<ellipse cx="132" cy="32" rx="17" ry="38" fill="#F7D02C" stroke="#D4A017" stroke-width="1" transform="rotate(15,132,32)"/>
<ellipse cx="128" cy="16" rx="11" ry="14" fill="#222"/>
<circle cx="84" cy="84" r="9" fill="#222"/>
<circle cx="116" cy="84" r="9" fill="#222"/>
<circle cx="86" cy="82" r="3.5" fill="#fff"/>
<circle cx="118" cy="82" r="3.5" fill="#fff"/>
<circle cx="67" cy="98" r="11" fill="#E33" opacity=".85"/>
<circle cx="133" cy="98" r="11" fill="#E33" opacity=".85"/>
<path d="M92 102 Q100 112 108 102" fill="none" stroke="#222" stroke-width="2.2" stroke-linecap="round"/>
<ellipse cx="52" cy="155" rx="14" ry="22" fill="#F7D02C" stroke="#D4A017" stroke-width="1" transform="rotate(25,52,155)"/>
<ellipse cx="148" cy="155" rx="14" ry="22" fill="#F7D02C" stroke="#D4A017" stroke-width="1" transform="rotate(-25,148,155)"/>
<ellipse cx="80" cy="222" rx="18" ry="11" fill="#F7D02C" stroke="#D4A017" stroke-width="1"/>
<ellipse cx="120" cy="222" rx="18" ry="11" fill="#F7D02C" stroke="#D4A017" stroke-width="1"/>
<path d="M142 195 L168 168 L158 150 L174 132 L152 146 L155 163 Z" fill="#F7D02C" stroke="#D4A017" stroke-width="1.2"/>
<path d="M168 168 L174 132 L158 150 Z" fill="#8B6914"/>
<path d="M142 195 L168 168 L158 150 L174 132 L152 146 L155 163 Z" fill="none" stroke="#8B6914" stroke-width="1.2"/>
</svg>
<p class="pikachu-label">皮卡丘 ~ ⚡</p>
</div>

<div class="card coin-card" id="coinCard">
<div class="coin-stage" id="coinStage">
<div class="coin" id="coin">
<div class="coin-face coin-front">
<span class="symbol">☀</span>
<span class="label">正 面</span>
</div>
<div class="coin-face coin-back">
<span class="symbol">☾</span>
<span class="label">反 面</span>
</div>
</div>
</div>
<p class="coin-status" id="coinStatus">点击按钮开始抛硬币吧！</p>
</div>

<div class="card result-card" id="resultCard">
<h3>📊 结果面板</h3>
<div id="singleResult">
<p style="text-align:center;color:#999;margin-top:40px">等待抛掷结果...</p>
</div>
<div id="multiResults" style="display:none">
<div id="statsContent"></div>
</div>
</div>
</div>

<div class="btn-group">
<button class="btn btn-primary" id="btnSingle" onclick="flipOnce()">🎯 抛一次</button>
<button class="btn btn-ten" id="btnMulti" onclick="flipThousand()">🔥 抛一千次</button>
<button class="btn btn-outline" id="btnReset" onclick="resetAll()">🔄 重置</button>
</div>
<footer>⚡ 每次抛掷独立随机，正面/反面概率各50% · 皮卡丘为你加油 ⚡</footer>

<script>
var isAnimating=false;
var coin=document.getElementById('coin');
var coinStage=document.getElementById('coinStage');
var coinStatus=document.getElementById('coinStatus');
var pikachuCard=document.getElementById('pikachuCard');
var singleResult=document.getElementById('singleResult');
var multiResults=document.getElementById('multiResults');
var statsContent=document.getElementById('statsContent');
var btnSingle=document.getElementById('btnSingle');
var btnMulti=document.getElementById('btnMulti');

function setButtons(enabled){
  btnSingle.disabled=!enabled;
  btnMulti.disabled=!enabled;
}

function sparkle(){
  var s=document.createElement('span');
  var emojis=['✨','⭐','💫','🌟','⚡','💛'];
  s.textContent=emojis[Math.floor(Math.random()*emojis.length)];
  s.className='sparkles';
  s.style.left=(40+Math.random()*60)+'%';
  s.style.top=(20+Math.random()*40)+'%';
  pikachuCard.appendChild(s);
  setTimeout(function(){s.remove();},1600);
}

function pikaThrow(){
  pikachuCard.classList.add('throw');
  setTimeout(function(){pikachuCard.classList.remove('throw');},400);
  for(var i=0;i<5;i++){setTimeout(function(){sparkle();},i*80);}
}

function getRandomResult(){
  return Math.random()<0.5?'heads':'tails';
}

function animateCoin(result,callback){
  isAnimating=true;
  setButtons(false);
  coinStage.classList.add('flipping');
  pikaThrow();
  var finalRot=result==='heads'?2160:2340;
  var anim=coin.animate([
    {transform:'translateY(0) rotateY(0deg) scale(1)',offset:0},
    {transform:'translateY(-260px) rotateY(720deg) scale(1.6)',offset:0.28},
    {transform:'translateY(-260px) rotateY(1080deg) scale(1.6)',offset:0.38},
    {transform:'translateY(-100px) rotateY(1440deg) scale(1.3)',offset:0.55},
    {transform:'translateY(-40px) rotateY(1800deg) scale(1.08)',offset:0.72},
    {transform:'translateY(8px) rotateY('+(finalRot-180)+'deg) scale(0.94)',offset:0.88},
    {transform:'translateY(0) rotateY('+finalRot+'deg) scale(1)',offset:1}
  ],{
    duration:2200,
    easing:'cubic-bezier(0.25,0.1,0.1,1)',
    fill:'forwards'
  });
  anim.onfinish=function(){
    coinStage.classList.remove('flipping');
    isAnimating=false;
    setButtons(true);
    coinStatus.textContent=result==='heads'?'🌟 结果：正 面！':'🌙 结果：反 面！';
    coinStatus.style.color=result==='heads'?'#E65100':'#424242';
    if(callback)callback();
  };
}

function showSingleResult(result){
  multiResults.style.display='none';
  singleResult.style.display='block';
  var cls=result==='heads'?'heads':'tails';
  var txt=result==='heads'?'☀ 正 面':'☾ 反 面';
  singleResult.innerHTML='<div style="text-align:center;margin-top:20px"><div class="result-badge '+cls+'">'+txt+'</div><p style="text-align:center;color:#888;font-size:.85rem;margin-top:8px">概率：50% vs 50%</p></div>';
}

function showThousandResults(results){
  singleResult.style.display='none';
  multiResults.style.display='block';
  var heads=0, tails=0;
  for(var i=0;i<results.length;i++){
    if(results[i]==='heads')heads++; else tails++;
  }
  var hpct=(heads/results.length*100).toFixed(1);
  var tpct=(tails/results.length*100).toFixed(1);
  var expected=results.length/2;
  var deviation=Math.abs(heads-expected);

  // first 10 as preview
  var previewHTML='<div class="preview-label">前 10 次预览</div><div class="result-grid">';
  for(var i=0;i<10;i++){
    var r=results[i];
    previewHTML+='<div class="result-item '+r+'" style="animation-delay:'+(i*0.04)+'s">'+(r==='heads'?'☀':'☾')+'</div>';
  }
  previewHTML+='</div>';

  statsContent.innerHTML=
    '<div class="stats-title">📈 一千次抛掷统计</div>'+
    '<div class="stats">'+
    '<div class="stats-row"><span>☀ 正面</span><span><strong>'+heads+'</strong> 次 ('+hpct+'%)</span></div>'+
    '<div class="stats-bar"><div class="heads-bar" style="width:'+hpct+'%"></div><div class="tails-bar" style="width:'+tpct+'%"></div></div>'+
    '<div class="stats-row"><span>☾ 反面</span><span><strong>'+tails+'</strong> 次 ('+tpct+'%)</span></div>'+
    '<div class="deviation">偏离期望值 500：<strong>'+(deviation>0?'+':'')+Math.round(deviation)+'</strong> 次（'+(deviation/10).toFixed(1)+'%）</div>'+
    '</div>'+
    previewHTML;
}

function flipOnce(){
  if(isAnimating)return;
  coinStatus.textContent='皮卡丘正在抛硬币... ⚡';
  coinStatus.style.color='#FF6B35';
  var result=getRandomResult();
  animateCoin(result,function(){showSingleResult(result);});
}

function flipThousand(){
  if(isAnimating)return;
  coinStatus.textContent='皮卡丘正在计算一千次... ⚡';
  coinStatus.style.color='#7C4DFF';
  var results=[];
  for(var i=0;i<1000;i++){results.push(getRandomResult());}
  var lastResult=results[999];
  animateCoin(lastResult,function(){showThousandResults(results);});
}

function resetAll(){
  if(isAnimating)return;
  coin.style.transform='translateY(0) rotateY(0deg) scale(1)';
  coinStatus.textContent='点击按钮开始抛硬币吧！';
  coinStatus.style.color='#E65100';
  singleResult.innerHTML='<p style="text-align:center;color:#999;margin-top:40px">等待抛掷结果...</p>';
  singleResult.style.display='block';
  multiResults.style.display='none';
  statsContent.innerHTML='';
}
</script>
</body>
</html>
